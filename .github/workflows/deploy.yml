name: FTP Auto Deploy on Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装项目依赖
        run: npm install

      - name: 编译 Astro 网站
        run: npm run build

      - name: 🚀 FTP 自动部署至服务器
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/fanfanqiang.net/
          protocol: ftps
          security: loose
          timeout: 600000
          log-level: verbose
