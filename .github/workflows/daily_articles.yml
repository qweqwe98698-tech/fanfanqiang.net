name: Daily SEO Article Generator

on:
  schedule:
    # 每天北京时间凌晨 1:18 执行 (UTC 时间 17:18)
    - cron: '18 17 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    # 赋予机器人写入仓库的权限，否则无法推送
    permissions:
      contents: write

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v3

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 运行自动写文章脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node auto_daily_articles.js

      - name: 提交并推送到 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加所有新生成的文件和修改过的主页
          git add .
          
          # 如果有变化则提交，如果没有变化则忽略
          git commit -m "Auto-generate daily SEO articles" || echo "No changes to commit"
          
          # 推送到当前分支
          git push


      - name: 准备上传文件
        run: node prepare_upload.js

      - name: 🚀 FTP 自动部署至服务器
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./ready_to_upload/
          server-dir: /public_html/fanfanqiang.net/
          # --- 💡 尝试开启 FTPS 加密 ---
          # 很多服务器（如 Hostinger, cPanel 等）默认拒绝普通 FTP，必须使用加密。
          protocol: ftps
          # loose 选项允许自签名的 SSL 证书
          security: loose
          timeout: 600000
          log-level: verbose
